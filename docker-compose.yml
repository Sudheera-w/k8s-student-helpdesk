  services:

    mysql:
      image: mysql:8
      container_name: mysql-db
      restart: always

      environment:
        MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
        MYSQL_DATABASE: ${MYSQL_DATABASE}

      ports:
        - "3307:3306"

      volumes:
        - mysql_data:/var/lib/mysql

      networks:
        - helpdesk-network

    backend:
      build: ./backend
      container_name: helpdesk-backend
      restart: always

      ports:
        - "8080:8080"

      environment:
        DB_URL: ${DB_URL}
        DB_USERNAME: ${DB_USERNAME}
        DB_PASSWORD: ${DB_PASSWORD}

      depends_on:
        - mysql

      networks:
        - helpdesk-network

    frontend:
      build: ./frontend
      container_name: helpdesk-frontend
      restart: always

      ports:
        - "5173:5173"

      depends_on:
        - backend

      networks:
        - helpdesk-network

  volumes:
    mysql_data:

  networks:
    helpdesk-network: